name: word-page-bot

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.state"
      - "grammar/**"
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: word-page-bot
  cancel-in-progress: false

jobs:
  create-word-pages:
    runs-on: ubuntu-latest
    env:
      WIKI_USERNAME: EmmaBot@EmmaBot
      WIKI_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
      WIKI_EDIT_LIMIT: "100"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mwclient requests

      - name: Run word page bot
        run: |
          chmod +x wiki-scripts/word_page_loop.sh
          wiki-scripts/word_page_loop.sh

      # State is committed incrementally inside word_page_loop.sh
      # after each phase that mutates state files.
